apiVersion: apps/v1
kind: Deployment
metadata:
  name: ai-analyzer
  namespace: default
  labels:
    app: ai-analyzer
    component: ai
    part-of: observability-platform
spec:
  replicas: 1
  selector:
    matchLabels:
      app: ai-analyzer
  template:
    metadata:
      labels:
        app: ai-analyzer
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "8000"
        prometheus.io/path: "/health"
    spec:
      containers:
      - name: ai-analyzer
        image: ai-analyzer:latest          # ← Nom de ton image Docker buildée
        imagePullPolicy: Never             # Important pour Minikube (image locale)
        ports:
        - containerPort: 8000
          name: http
        env:
        - name: GROQ_API_KEY
          valueFrom:
            secretKeyRef:
              name: ai-analyzer-secret
              key: GROQ_API_KEY
        resources:
          requests:
            memory: "128Mi"
            cpu: "100m"
          limits:
            memory: "256Mi"
            cpu: "300m"
        livenessProbe:
          httpGet:
            path: /health
            port: 8000
          initialDelaySeconds: 10
          periodSeconds: 15
        readinessProbe:
          httpGet:
            path: /health
            port: 8000
          initialDelaySeconds: 5
          periodSeconds: 10

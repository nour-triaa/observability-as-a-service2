apiVersion: apps/v1
kind: Deployment
metadata:
  name: alert-receiver
  namespace: default
spec:
  replicas: 1
  selector:
    matchLabels:
      app: alert-receiver
  template:
    metadata:
      labels:
        app: alert-receiver
    spec:
      containers:
      - name: alert-receiver
        image: alert-receiver:latest
        imagePullPolicy: Never
        ports:
          - containerPort: 5000
---
apiVersion: v1
kind: Service
metadata:
  name: alert-receiver
  namespace: default
spec:
  type: ClusterIP
  selector:
    app: alert-receiver
  ports:
    - port: 5000
      targetPort: 5000

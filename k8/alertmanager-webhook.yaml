apiVersion: v1
kind: ConfigMap
metadata:
  name: alertmanager-config
  namespace: observability
data:
  config.yaml: |
    global:
      resolve_timeout: 5m
    route:
      receiver: frontend-webhook
      group_by: [alertname]
      group_wait: 10s
      group_interval: 5m
      repeat_interval: 1h
    receivers:
      - name: frontend-webhook
        webhook_configs:
          - url: http://identity-service.default.svc.cluster.local:8080/api/alerts
            send_resolved: true
